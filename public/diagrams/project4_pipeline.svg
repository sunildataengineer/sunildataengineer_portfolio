<svg width="900" height="500" viewBox="0 0 900 500" xmlns="http://www.w3.org/2000/svg">
<defs>
  <style>
    @keyframes scan{0%{transform:translateY(-500px)}100%{transform:translateY(500px)}}
    @keyframes np{0%,100%{r:12;opacity:.4}50%{r:16;opacity:1}}
    @keyframes pipeGlow{0%,100%{stroke-opacity:.2}50%{stroke-opacity:.9}}
    @keyframes pkt{0%{transform:translateX(0);opacity:0}5%{opacity:1}90%{opacity:1}100%{transform:translateX(120px);opacity:0}}
    @keyframes pktU{0%{transform:translateY(0);opacity:0}5%{opacity:1}90%{opacity:1}100%{transform:translateY(-70px);opacity:0}}
    @keyframes pktD{0%{transform:translateY(0);opacity:0}5%{opacity:1}90%{opacity:1}100%{transform:translateY(65px);opacity:0}}
    @keyframes walPulse{0%,100%{fill-opacity:.08}50%{fill-opacity:.22}}
    @keyframes opFlash{0%,74%,100%{fill:#040A04;stroke-opacity:.25}75%,90%{fill:#0A1E0A;stroke-opacity:1}}
    @keyframes auditBlink{0%,88%,100%{opacity:.5}89%,96%{opacity:1}}
    @keyframes mb{0%,100%{transform:translateY(0)}50%{transform:translateY(-2px)}}
    @keyframes shimmer{0%{x:-200}100%{x:1100}}
    @keyframes schemaChange{0%,82%,100%{stroke:#FF6B00;stroke-opacity:.3}83%,92%{stroke:#FF6B00;stroke-opacity:1;stroke-width:2.5}}
    .sc{animation:scan 6s linear infinite}
    .n1{animation:np 2s ease-in-out infinite}
    .n2{animation:np 2s ease-in-out infinite .4s}
    .n3{animation:np 2s ease-in-out infinite .8s}
    .n4{animation:np 2s ease-in-out infinite 1.2s}
    .n5{animation:np 2s ease-in-out infinite 1.6s}
    .n6{animation:np 2s ease-in-out infinite 2s}
    .pg{animation:pipeGlow 2.5s ease-in-out infinite}
    .p1{animation:pkt 2s linear infinite}
    .p2{animation:pkt 2s linear infinite .65s}
    .p3{animation:pkt 2s linear infinite 1.3s}
    .p4{animation:pkt 2.2s linear infinite .3s}
    .p5{animation:pkt 2.2s linear infinite 1.1s}
    .p6{animation:pkt 2.3s linear infinite .6s}
    .p7{animation:pkt 2.3s linear infinite 1.5s}
    .p8{animation:pkt 2.4s linear infinite .9s}
    .pu1{animation:pktU 2.5s linear infinite 1.2s}
    .pu2{animation:pktU 2.5s linear infinite 2.8s}
    .pd1{animation:pktD 2.2s linear infinite .8s}
    .pd2{animation:pktD 2.2s linear infinite 2.2s}
    .wal{animation:walPulse 3s ease-in-out infinite}
    .op1{animation:opFlash 5s ease-in-out infinite}
    .op2{animation:opFlash 5s ease-in-out infinite 1.6s}
    .op3{animation:opFlash 5s ease-in-out infinite 3.2s}
    .ab{animation:auditBlink 4s ease-in-out infinite}
    .mb{animation:mb 2.5s ease-in-out infinite}
    .sc2{animation:schemaChange 7s ease-in-out infinite}
  </style>
  <linearGradient id="bg4" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" style="stop-color:#080504"/>
    <stop offset="100%" style="stop-color:#0E0804"/>
  </linearGradient>
  <linearGradient id="top4" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%" style="stop-color:#7A3200"/>
    <stop offset="50%" style="stop-color:#FF6B00"/>
    <stop offset="100%" style="stop-color:#7A3200"/>
  </linearGradient>
  <filter id="g4"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  <filter id="sg4"><feGaussianBlur stdDeviation="7" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  <marker id="aO4" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#FF6B00" opacity=".8"/></marker>
  <marker id="aY4" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#FFD700" opacity=".8"/></marker>
  <marker id="aG4" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#00FF88" opacity=".8"/></marker>
  <marker id="aW4" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#FFFFFF" opacity=".6"/></marker>
  <marker id="aU4" markerWidth="6" markerHeight="6" refX="3" refY="0" orient="auto"><path d="M0,6 L3,0 L6,6 Z" fill="#FF4444" opacity=".8"/></marker>
  <marker id="aD4" markerWidth="6" markerHeight="6" refX="3" refY="6" orient="auto"><path d="M0,0 L3,6 L6,0 Z" fill="#00FF88" opacity=".8"/></marker>
</defs>

<rect width="900" height="500" fill="url(#bg4)"/>
<g stroke="#FF6B00" stroke-width=".3" opacity=".04">
  <line x1="0" y1="40" x2="900" y2="40"/><line x1="0" y1="80" x2="900" y2="80"/><line x1="0" y1="120" x2="900" y2="120"/>
  <line x1="0" y1="160" x2="900" y2="160"/><line x1="0" y1="200" x2="900" y2="200"/><line x1="0" y1="240" x2="900" y2="240"/>
  <line x1="0" y1="280" x2="900" y2="280"/><line x1="0" y1="320" x2="900" y2="320"/><line x1="0" y1="360" x2="900" y2="360"/>
  <line x1="0" y1="400" x2="900" y2="400"/><line x1="0" y1="440" x2="900" y2="440"/>
  <line x1="90" y1="0" x2="90" y2="500"/><line x1="180" y1="0" x2="180" y2="500"/><line x1="270" y1="0" x2="270" y2="500"/>
  <line x1="360" y1="0" x2="360" y2="500"/><line x1="450" y1="0" x2="450" y2="500"/><line x1="540" y1="0" x2="540" y2="500"/>
  <line x1="630" y1="0" x2="630" y2="500"/><line x1="720" y1="0" x2="720" y2="500"/><line x1="810" y1="0" x2="810" y2="500"/>
</g>
<rect class="sc" width="900" height="35" fill="white" opacity=".012"/>
<rect width="200" height="36" y="0" fill="#FF6B00" opacity="0"><animate attributeName="x" from="-200" to="1100" dur="4s" repeatCount="indefinite"/><animate attributeName="opacity" values="0;.06;0" dur="4s" repeatCount="indefinite"/></rect>

<!-- Top bar -->
<rect x="0" y="0" width="900" height="36" fill="url(#top4)"/>
<text x="18" y="23" font-family="monospace" font-size="12" font-weight="bold" fill="white" letter-spacing="2">⚡ REAL-TIME CDC &amp; DATABASE REPLICATION PIPELINE</text>
<circle cx="615" cy="18" r="5" fill="#00FF88" filter="url(#g4)"/><circle cx="615" cy="18" r="4" fill="#00FF88"><animate attributeName="r" values="4;10;4" dur="2s" repeatCount="indefinite"/><animate attributeName="opacity" values="1;0;1" dur="2s" repeatCount="indefinite"/></circle>
<text x="626" y="23" font-family="monospace" font-size="10" fill="#00FF88">LIVE</text>
<text x="665" y="23" font-family="monospace" font-size="10" fill="white" opacity=".8">500K+ change events/day</text>
<text x="826" y="23" font-family="monospace" font-size="10" fill="#FFD700">AWS</text>

<!-- Title -->
<text x="450" y="68" text-anchor="middle" font-family="monospace" font-size="18" font-weight="bold" fill="white" letter-spacing="3" filter="url(#sg4)">CHANGE DATA CAPTURE STREAMING PIPELINE</text>
<text x="450" y="86" text-anchor="middle" font-family="monospace" font-size="10" fill="#FF6B00" letter-spacing="3">DEBEZIUM  ·  KAFKA  ·  SPARK  ·  SNOWFLAKE  ·  S3</text>

