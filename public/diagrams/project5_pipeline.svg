<svg width="900" height="500" viewBox="0 0 900 500" xmlns="http://www.w3.org/2000/svg">
<defs>
  <style>
    @keyframes scan5{0%{transform:translateY(-500px)}100%{transform:translateY(500px)}}
    @keyframes np5{0%,100%{r:12;opacity:.4}50%{r:16;opacity:1}}
    @keyframes pg5{0%,100%{stroke-opacity:.2}50%{stroke-opacity:.9}}
    @keyframes pk5{0%{transform:translateX(0);opacity:0}5%{opacity:1}90%{opacity:1}100%{transform:translateX(118px);opacity:0}}
    @keyframes pkU5{0%{transform:translateY(0);opacity:0}5%{opacity:1}90%{opacity:1}100%{transform:translateY(-68px);opacity:0}}
    @keyframes pkD5{0%{transform:translateY(0);opacity:0}5%{opacity:1}90%{opacity:1}100%{transform:translateY(68px);opacity:0}}
    @keyframes driftAlert{0%,84%,100%{opacity:0}85%,96%{opacity:1}}
    @keyframes freshnessPing{0%{r:4;opacity:1}100%{r:14;opacity:0}}
    @keyframes redisGlow{0%,100%{fill-opacity:.08}50%{fill-opacity:.28}}
    @keyframes mb5{0%,100%{transform:translateY(0)}50%{transform:translateY(-2px)}}
    @keyframes featureCalc{0%,78%,100%{stroke:#9B59B6;stroke-opacity:.3}79%,91%{stroke:#CC44FF;stroke-opacity:1}}
    .sc5{animation:scan5 6s linear infinite}
    .n1{animation:np5 2s ease-in-out infinite}
    .n2{animation:np5 2s ease-in-out infinite .4s}
    .n3{animation:np5 2s ease-in-out infinite .8s}
    .n4{animation:np5 2s ease-in-out infinite 1.2s}
    .n5{animation:np5 2s ease-in-out infinite 1.6s}
    .n6{animation:np5 2s ease-in-out infinite 2s}
    .pg5{animation:pg5 2.5s ease-in-out infinite}
    .p1{animation:pk5 2s linear infinite}
    .p2{animation:pk5 2s linear infinite .65s}
    .p3{animation:pk5 2s linear infinite 1.3s}
    .p4{animation:pk5 2.2s linear infinite .3s}
    .p5{animation:pk5 2.2s linear infinite 1.1s}
    .p6{animation:pk5 2.3s linear infinite .6s}
    .p7{animation:pk5 2.3s linear infinite 1.5s}
    .p8{animation:pk5 2.4s linear infinite .9s}
    .pu1{animation:pkU5 2.5s linear infinite .8s}
    .pu2{animation:pkU5 2.5s linear infinite 2.3s}
    .pd1{animation:pkD5 2.2s linear infinite 1.1s}
    .pd2{animation:pkD5 2.2s linear infinite 2.6s}
    .da{animation:driftAlert 5s ease-in-out infinite 2s}
    .fp1{animation:freshnessPing 2s ease-out infinite}
    .fp2{animation:freshnessPing 2s ease-out infinite 1s}
    .rg{animation:redisGlow 3s ease-in-out infinite}
    .mb5{animation:mb5 2.5s ease-in-out infinite}
    .fc{animation:featureCalc 6s ease-in-out infinite}
  </style>
  <linearGradient id="bg5" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" style="stop-color:#060408"/>
    <stop offset="100%" style="stop-color:#0C0810"/>
  </linearGradient>
  <linearGradient id="top5" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%" style="stop-color:#4A1A6A"/>
    <stop offset="50%" style="stop-color:#9B59B6"/>
    <stop offset="100%" style="stop-color:#4A1A6A"/>
  </linearGradient>
  <filter id="g5"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  <filter id="sg5"><feGaussianBlur stdDeviation="7" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  <marker id="aP5" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#9B59B6" opacity=".8"/></marker>
  <marker id="aR5" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#FF4444" opacity=".8"/></marker>
  <marker id="aCy" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#00DDFF" opacity=".8"/></marker>
  <marker id="aG5" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#00FF88" opacity=".8"/></marker>
  <marker id="aU5" markerWidth="6" markerHeight="6" refX="3" refY="0" orient="auto"><path d="M0,6 L3,0 L6,6 Z" fill="#00DDFF" opacity=".8"/></marker>
  <marker id="aD5" markerWidth="6" markerHeight="6" refX="3" refY="6" orient="auto"><path d="M0,0 L3,6 L6,0 Z" fill="#00FF88" opacity=".8"/></marker>
